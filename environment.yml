name: causal-field
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pandas>=2.0.0
  - numpy>=1.24.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - scipy>=1.11.0
  - statsmodels>=0.14.0
  - scikit-learn>=1.3.0
  - jupyter
  - notebook
  - ipykernel
  - pip
  - pip:
      - dowhy>=0.11.0            # causal inference: DAG → identification → estimation → refutation
      - econml>=0.15.0           # modern causal estimators (DML, DR-Learner)
      - causalinference>=0.1.3   # propensity matching
      - pysyncon>=0.4.0          # synthetic control
      - lifelines>=0.28.0        # survival analysis: KM, Cox PH, Weibull AFT
      - scikit-survival>=0.22.0  # gradient-boosting survival
      - plotly>=5.20.0
      - networkx>=3.0            # causal DAG rendering
      - joblib>=1.3.0
